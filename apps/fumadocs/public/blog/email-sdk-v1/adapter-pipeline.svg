<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Email SDK v1 adapter pipeline</title><desc id="desc">A normalized email message passes through common and capability validation before routing to one of several email adapters.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#090b0e"/><stop offset="1" stop-color="#131820"/></linearGradient><linearGradient id="blue" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#4f8cff"/><stop offset="1" stop-color="#76b4ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#657184"/></marker></defs>
<rect width="1200" height="675" rx="32" fill="url(#bg)"/><g opacity=".22" stroke="#3b4554"><path d="M0 112H1200M0 224H1200M0 336H1200M0 448H1200M0 560H1200"/><path d="M150 0V675M300 0V675M450 0V675M600 0V675M750 0V675M900 0V675M1050 0V675"/></g>
<text x="72" y="78" fill="#f6f7f9" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="700">One message shape. Explicit routes.</text><text x="72" y="112" fill="#9099a8" font-family="Inter,Arial,sans-serif" font-size="17">Validation runs before any provider can silently drop a field.</text>
<g filter="url(#shadow)"><rect x="72" y="225" width="250" height="220" rx="22" fill="#12161c" stroke="#313946"/><rect x="92" y="247" width="210" height="34" rx="10" fill="#1b222c"/><circle cx="112" cy="264" r="5" fill="#6da4ff"/><text x="128" y="270" fill="#dce3ed" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">EmailMessage</text><text x="98" y="321" fill="#8994a4" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">from</text><text x="192" y="321" fill="#dce3ed" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">Acme</text><text x="98" y="351" fill="#8994a4" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">to</text><text x="192" y="351" fill="#dce3ed" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">Ada</text><text x="98" y="381" fill="#8994a4" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">subject</text><text x="192" y="381" fill="#dce3ed" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">Welcome</text><text x="98" y="411" fill="#8994a4" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">attachments</text><text x="260" y="411" fill="#67d7a2" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14">✓</text></g>
<path d="M337 335H409" stroke="#657184" stroke-width="3" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="430" y="190" width="290" height="290" rx="24" fill="#11161d" stroke="#38547c"/><rect x="452" y="214" width="246" height="48" rx="12" fill="#172231" stroke="#27466e"/><text x="575" y="244" text-anchor="middle" fill="#bcd6ff" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700">COMMON VALIDATION</text><path d="M478 303H672" stroke="#293443" stroke-width="2"/><circle cx="478" cy="303" r="8" fill="#67d7a2"/><text x="500" y="309" fill="#d8dee8" font-family="Inter,Arial,sans-serif" font-size="16">required fields</text><path d="M478 354H672" stroke="#293443" stroke-width="2"/><circle cx="478" cy="354" r="8" fill="#67d7a2"/><text x="500" y="360" fill="#d8dee8" font-family="Inter,Arial,sans-serif" font-size="16">address + schedule</text><path d="M478 405H672" stroke="#293443" stroke-width="2"/><circle cx="478" cy="405" r="8" fill="#67d7a2"/><text x="500" y="411" fill="#d8dee8" font-family="Inter,Arial,sans-serif" font-size="16">adapter capabilities</text><text x="575" y="451" text-anchor="middle" fill="#7f8a9a" font-family="Inter,Arial,sans-serif" font-size="14">reject unsupported fields before send</text></g>
<path d="M735 335H801" stroke="#657184" stroke-width="3" marker-end="url(#arrow)"/>
<g filter="url(#shadow)" font-family="Inter,Arial,sans-serif"><rect x="820" y="170" width="308" height="330" rx="24" fill="#11161d" stroke="#313946"/><text x="850" y="213" fill="#f6f7f9" font-size="17" font-weight="700">Adapter route</text><rect x="850" y="239" width="248" height="48" rx="12" fill="url(#blue)"/><text x="974" y="269" text-anchor="middle" fill="#07111f" font-size="16" font-weight="800">resend</text><rect x="850" y="303" width="248" height="48" rx="12" fill="#1a2029" stroke="#344050"/><text x="974" y="333" text-anchor="middle" fill="#dbe2eb" font-size="16" font-weight="700">postmark</text><rect x="850" y="367" width="248" height="48" rx="12" fill="#1a2029" stroke="#344050"/><text x="974" y="397" text-anchor="middle" fill="#dbe2eb" font-size="16" font-weight="700">smtp</text><rect x="850" y="431" width="248" height="48" rx="12" fill="#151a21" stroke="#2a333f" stroke-dasharray="7 7"/><text x="974" y="461" text-anchor="middle" fill="#8e99a8" font-size="15">20 more adapters</text></g>
<text x="72" y="612" fill="#6f7a89" font-family="Inter,Arial,sans-serif" font-size="15">EMAIL SDK v1 • adapter names stay literal through validation, routing, results, and errors</text></svg>
