<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">Email SDK v1 sending modes</title><desc id="desc">The v1 client exposes send for one message, sendMany for ordered independent sends, and sendPersonalized for recipient-specific variables.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#090b0e"/><stop offset="1" stop-color="#141922"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter></defs><rect width="1200" height="675" rx="32" fill="url(#bg)"/><text x="70" y="76" fill="#f7f8fa" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="700">Three methods make execution intent visible.</text><text x="70" y="110" fill="#919baa" font-family="Inter,Arial,sans-serif" font-size="17">Single, ordered batch, and recipient-specific sends no longer share one overloaded path.</text>
<g filter="url(#shadow)" font-family="Inter,Arial,sans-serif"><rect x="68" y="174" width="330" height="380" rx="24" fill="#11161d" stroke="#334052"/><rect x="92" y="198" width="282" height="62" rx="14" fill="#172a43" stroke="#4d83c9"/><text x="233" y="237" text-anchor="middle" fill="#bcd8ff" font-size="21" font-weight="800">send()</text><path d="M188 330l45 31 45-31v61h-90z" fill="#19365c" stroke="#73aeff" stroke-width="2"/><path d="M188 330l45 31 45-31" fill="none" stroke="#a5ccff" stroke-width="2"/><text x="233" y="439" text-anchor="middle" fill="#f0f3f7" font-size="18" font-weight="700">One message</text><text x="233" y="471" text-anchor="middle" fill="#8f99a8" font-size="15">one result or typed error</text><text x="233" y="508" text-anchor="middle" fill="#6f7b8c" font-size="13">transactional send</text>
<rect x="435" y="174" width="330" height="380" rx="24" fill="#11161d" stroke="#334052"/><rect x="459" y="198" width="282" height="62" rx="14" fill="#1b2520" stroke="#3f735d"/><text x="600" y="237" text-anchor="middle" fill="#c7f4df" font-size="21" font-weight="800">sendMany()</text><g fill="#173025" stroke="#67d7a2" stroke-width="2"><rect x="520" y="307" width="160" height="48" rx="10"/><rect x="520" y="370" width="160" height="48" rx="10"/><rect x="520" y="433" width="160" height="48" rx="10"/></g><g fill="#9ce9c4" font-size="14" font-weight="700"><text x="544" y="337">01</text><text x="544" y="400">02</text><text x="544" y="463">03</text></g><g fill="#dbe9e1" font-size="14"><text x="585" y="337">welcome</text><text x="585" y="400">receipt</text><text x="585" y="463">alert</text></g><text x="600" y="516" text-anchor="middle" fill="#8f99a8" font-size="15">ordered and settled</text>
<rect x="802" y="174" width="330" height="380" rx="24" fill="#11161d" stroke="#334052"/><rect x="826" y="198" width="282" height="62" rx="14" fill="#2a2113" stroke="#805c28"/><text x="967" y="237" text-anchor="middle" fill="#ffe0a8" font-size="20" font-weight="800">sendPersonalized()</text><rect x="872" y="298" width="190" height="76" rx="13" fill="#1e2229" stroke="#454f5d"/><text x="967" y="328" text-anchor="middle" fill="#dbe1e9" font-size="14">Hi %recipient.name%</text><text x="967" y="352" text-anchor="middle" fill="#778291" font-size="13">shared template</text><path d="M967 386v38M967 424l-75 34M967 424l75 34" stroke="#687483" stroke-width="3" fill="none"/><circle cx="892" cy="467" r="25" fill="#173154" stroke="#6ba8ff"/><circle cx="1042" cy="467" r="25" fill="#3a2d16" stroke="#e0a84b"/><text x="892" y="505" text-anchor="middle" fill="#a6b0be" font-size="13">Ada</text><text x="1042" y="505" text-anchor="middle" fill="#a6b0be" font-size="13">Linus</text></g><text x="70" y="622" fill="#6f7987" font-family="Inter,Arial,sans-serif" font-size="14">All three methods keep adapter routing, retries, fallback, idempotency, hooks, and typed errors in the same client.</text></svg>
