<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">Delivery certainty and safe fallback</title><desc id="desc">A provider request may be accepted before the response is lost. Email SDK v1 marks this outcome unknown and stops fallback by default to avoid a duplicate.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#090b0e"/><stop offset="1" stop-color="#15191f"/></linearGradient><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#68a6ff"/></marker><marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#697483"/></marker><filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter></defs><rect width="1200" height="675" rx="32" fill="url(#bg)"/><text x="70" y="76" fill="#f7f8fa" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="700">A timeout does not prove that an email was not sent.</text><text x="70" y="110" fill="#919baa" font-family="Inter,Arial,sans-serif" font-size="17">v1 separates delivery certainty from ordinary retryability.</text>
<g filter="url(#shadow)" font-family="Inter,Arial,sans-serif"><rect x="72" y="220" width="200" height="150" rx="22" fill="#12171e" stroke="#303947"/><circle cx="172" cy="263" r="23" fill="#172a43" stroke="#4b82c9"/><path d="M160 263h24M172 251v24" stroke="#8fbcff" stroke-width="3"/><text x="172" y="319" text-anchor="middle" fill="#f0f3f7" font-size="18" font-weight="700">Your app</text><text x="172" y="345" text-anchor="middle" fill="#8f99a8" font-size="14">email.send()</text><rect x="487" y="220" width="226" height="150" rx="22" fill="#12171e" stroke="#3b5375"/><path d="M560 261l40 28 40-28v52h-80z" fill="#173154" stroke="#6ca8ff" stroke-width="2"/><path d="M560 261l40 28 40-28" fill="none" stroke="#9bc4ff" stroke-width="2"/><text x="600" y="319" text-anchor="middle" fill="#f0f3f7" font-size="18" font-weight="700">Primary adapter</text><text x="600" y="345" text-anchor="middle" fill="#8f99a8" font-size="14">provider accepted?</text><rect x="918" y="220" width="210" height="150" rx="22" fill="#12171e" stroke="#303947"/><circle cx="1023" cy="272" r="25" fill="#312817" stroke="#d49b3d"/><path d="M1023 253v22M1023 286v2" stroke="#ffd27e" stroke-width="4" stroke-linecap="round"/><text x="1023" y="319" text-anchor="middle" fill="#f0f3f7" font-size="18" font-weight="700">Backup adapter</text><text x="1023" y="345" text-anchor="middle" fill="#8f99a8" font-size="14">paused by default</text></g>
<path d="M287 272H467" stroke="#68a6ff" stroke-width="4" marker-end="url(#arrowBlue)"/><text x="377" y="252" text-anchor="middle" fill="#9dc6ff" font-family="Inter,Arial,sans-serif" font-size="14">request dispatched</text><path d="M487 329H308" stroke="#697483" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#arrowGray)"/><text x="398" y="359" text-anchor="middle" fill="#8b95a4" font-family="Inter,Arial,sans-serif" font-size="14">response lost</text><path d="M728 295H891" stroke="#d79b3d" stroke-width="4" stroke-dasharray="10 9"/><path d="M810 273v44M787 295h46" stroke="#ffcb70" stroke-width="5" stroke-linecap="round"/><text x="810" y="349" text-anchor="middle" fill="#e8b35a" font-family="Inter,Arial,sans-serif" font-size="14">stop fallback</text>
<g font-family="Inter,Arial,sans-serif"><rect x="72" y="449" width="500" height="126" rx="20" fill="#101a17" stroke="#285d49"/><circle cx="112" cy="490" r="9" fill="#67d7a2"/><text x="140" y="497" fill="#dff8eb" font-size="17" font-weight="700">delivery: "not_sent"</text><text x="112" y="535" fill="#8fb4a4" font-size="15">The adapter can prove no provider accepted the email.</text><text x="112" y="559" fill="#8fb4a4" font-size="15">Fallback may continue.</text><rect x="596" y="449" width="532" height="126" rx="20" fill="#211b11" stroke="#765422"/><circle cx="636" cy="490" r="9" fill="#ffbe55"/><text x="664" y="497" fill="#fff0d2" font-size="17" font-weight="700">delivery: "unknown"</text><text x="636" y="535" fill="#c7aa7b" font-size="15">Dispatch may have started, so delivery cannot be ruled out.</text><text x="636" y="559" fill="#c7aa7b" font-size="15">Fallback stops unless you explicitly opt in.</text></g><text x="70" y="629" fill="#6f7987" font-family="Inter,Arial,sans-serif" font-size="14">The SDK does not claim exactly-once delivery. It makes the uncertainty explicit so your application can choose.</text></svg>
