name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "package.json"
      - "packages/**"
      - "scripts/**"
      - "turbo.json"

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node for npm Trusted Publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and validate
        run: bun run release:ci

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          title: "Version packages"
          commit: "Version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}

      - name: Annotate release in PostHog
        if: steps.changesets.outputs.published == 'true'
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: |
          if [ -z "$POSTHOG_PERSONAL_API_KEY" ]; then
            echo "::notice::POSTHOG_PERSONAL_API_KEY not set; skipping release annotation."
            exit 0
          fi
          VERSION="$(bun -e 'const pkg = await Bun.file("packages/email-sdk/package.json").json(); console.log(pkg.version)')"
          curl --fail-with-body -sS -X POST "https://us.posthog.com/api/projects/468042/annotations/" \
            -H "Authorization: Bearer $POSTHOG_PERSONAL_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"@opencoredev/email-sdk v${VERSION} released\",\"date_marker\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"scope\":\"project\"}" \
            || echo "::warning::PostHog release annotation failed (non-blocking)."

      - name: Update Homebrew formula checksum
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun run homebrew:update
          if ! git diff --quiet -- Formula/email-sdk.rb; then
            VERSION="$(bun -e 'const pkg = await Bun.file("packages/email-sdk/package.json").json(); console.log(pkg.version)')"
            BRANCH="automation/homebrew-formula-${VERSION}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -B "$BRANCH"
            git add Formula/email-sdk.rb
            git commit -m "Update Homebrew formula for ${VERSION}"
            git push --force-with-lease origin "$BRANCH"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Update Homebrew formula for ${VERSION}" \
              --body "Updates the Homebrew formula to the published @opencoredev/email-sdk ${VERSION} npm tarball." \
              || echo "::notice::Pushed Homebrew formula update to ${BRANCH}. Open a pull request into main to apply it."
          fi
