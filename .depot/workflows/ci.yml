# Depot CI runs deterministic release checks on pull requests and main, then
# runs non-sending provider authentication probes for affected adapters on main.

name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  verify:
    name: Verify
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run release checks
        run: bun run release:ci
  ai-compatibility:
    name: ${{ matrix.name }}
    runs-on: depot-ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: AI SDK 6 on Node 20
            node: 20
            case: ai6
          - name: Chat plus AI SDK 7 on Node 22
            node: 22
            case: chat-ai7
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Email SDK
        run: bunx turbo run build --filter=@opencoredev/email-sdk
      - name: Run compatibility probe
        run: bash scripts/check-ai-compatibility.sh ${{ matrix.case }}
  live-adapters:
    name: Live adapter verification
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Select changed live adapters
        id: plan
        env:
          LIVE_ADAPTERS: ${{ github.event_name == 'workflow_dispatch' && 'all' || '' }}
        run: |
          adapters="$(bun run live:plan '${{ github.event.before }}' '${{ github.sha }}')"
          echo "adapters=$adapters" >> "$GITHUB_OUTPUT"
          echo "Selected live checks: ${adapters:-none}"
      - name: Run selected non-sending authentication checks
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TEST_DOMAIN: ${{ secrets.RESEND_TEST_DOMAIN }}
          SEQUENZY_API_KEY: ${{ secrets.SEQUENZY_API_KEY }}
          JETEMAIL_API_KEY: ${{ secrets.JETEMAIL_API_KEY }}
          PRIMITIVE_API_KEY: ${{ secrets.PRIMITIVE_API_KEY }}
          LETTERMINT_API_TOKEN: ${{ secrets.LETTERMINT_API_TOKEN }}
        run: bun run live:run -- "${{ steps.plan.outputs.adapters }}"
